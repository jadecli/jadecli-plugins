# Claude Code AI Review for Pull Requests
#
# Automatically reviews PRs using Claude Code to check plugin structure,
# version bumps, marketplace registration, and code quality.
#
# ACTIVATION: To enable this workflow:
#   1. Add ANTHROPIC_API_KEY as a repository secret
#      (Settings > Secrets and variables > Actions > New repository secret)
#   2. Uncomment the "Run Claude Code review" step below
#
# NOTE: Claude Max Pro uses interactive OAuth and cannot be used in
# headless CI environments. An API key is required.

name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.actor != 'release-please[bot]'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

