name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple
          package-name: jadecli-plugins

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      - name: Tag release
        if: ${{ steps.release.outputs.release_created }}
        run: |
          gh release edit ${{ steps.release.outputs.tag_name }} \
            --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
