name: Feature Request
description: Suggest a new skill, command, agent, or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Type
      description: What kind of addition?
      options:
        - New skill
        - New command
        - New agent
        - New hook
        - Improvement to existing component
        - New plugin
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What do you want and why?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Describe the workflow this enables
    validations:
      required: true
