name: New Plugin Proposal
description: Propose a new plugin for the marketplace
labels: ["plugin"]
body:
  - type: input
    id: name
    attributes:
      label: Plugin name
      description: Proposed plugin name (lowercase, hyphens)
      placeholder: e.g., jade-deploy
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What does this plugin do?
    validations:
      required: true
  - type: textarea
    id: components
    attributes:
      label: Planned components
      description: |
        List the skills, commands, agents, and hooks this plugin will include.
    validations:
      required: true
  - type: textarea
    id: overlap
    attributes:
      label: Overlap with existing plugins
      description: Does this overlap with adaptive-agent or other plugins? How will it differentiate?
    validations:
      required: false
