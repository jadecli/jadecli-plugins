name: Bug Report
description: Report a plugin bug or unexpected behavior
labels: ["bug"]
body:
  - type: dropdown
    id: plugin
    attributes:
      label: Plugin
      description: Which plugin is affected?
      options:
        - adaptive-agent
        - Other (specify below)
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component?
      options:
        - Skill (bootstrap, context-management, git-safety, compounding-review, tool-orchestration)
        - Command (bootstrap, review, merge-prs, safe-branch)
        - Agent (codebase-reviewer, pr-merger)
        - Hook (git safety)
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: How can we reproduce this?
    validations:
      required: true
  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code version
      description: Output of `claude --version`
    validations:
      required: false
